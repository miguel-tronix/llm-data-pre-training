apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestor-nginx-tls
  namespace: deepdive
  labels:
    app: deepdive
    component: pubmed-ingestor
data:
  nginx-egress.conf: |
    worker_processes 1;
    error_log /var/log/nginx/error.log info;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        access_log    /var/log/nginx/access.log;

        upstream deepdive_api {
            server deepdive-api.deepdive.svc.cluster.local:443;
        }

        server {
            listen 127.0.0.1:8080;

            location / {
                proxy_pass https://deepdive_api;
                
                # mTLS configuration for upstream
                proxy_ssl_certificate         /etc/nginx/certs/client.crt;
                proxy_ssl_certificate_key     /etc/nginx/certs/client.key;
                proxy_ssl_trusted_certificate /etc/nginx/certs/ca.crt;
                proxy_ssl_verify             on;
                proxy_ssl_verify_depth       2;
                
                # SNI is critical for most mTLS setups
                proxy_ssl_server_name       on;
                proxy_ssl_name              deepdive-api;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_connect_timeout 90;
                proxy_send_timeout 90;
                proxy_read_timeout 90;
            }
        }
    }
